<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHILYBOTICS™</title>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#ffffff;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* Subtle tech grid */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,255,120,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,120,0.04) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

/* Floating glow */
body::after{
  content:"";
  position:fixed;
  width:700px;
  height:700px;
  background:radial-gradient(circle, rgba(0,255,120,0.12), transparent 70%);
  animation:floatBackground 18s ease-in-out infinite;
  pointer-events:none;
}

@keyframes floatBackground{
  0%{ transform:translate(-80px,-60px);}
  50%{ transform:translate(60px,80px);}
  100%{ transform:translate(-80px,-60px);}
}

/* Card */
.card{
  width:95%;
  max-width:540px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(20px);
  border-radius:26px;
  box-shadow:
    0 30px 70px rgba(0,0,0,0.08),
    0 0 80px rgba(0,255,120,0.15);
  padding:40px 35px;
  text-align:center;
}

/* Logo */
.logo{
  width:100%;
  max-width:420px;
  margin:0 auto 25px auto;
}

/* FLOAT */
@keyframes floatMotion {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.float-layer {
  animation: floatMotion 4s ease-in-out infinite;
  transform-origin: center;
}

/* ROTATION */
@keyframes rotateMotion {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.rotate-layer {
  transform-origin: 95px 105px;
  animation: rotateMotion 30s linear infinite;
}

/* SHADOW */
@keyframes shadowMotion {
  0%,100% {
    transform: scale(1);
    opacity: 0.25;
  }
  50% {
    transform: scale(0.8);
    opacity: 0.15;
  }
}

.shadow-layer {
  animation: shadowMotion 4s ease-in-out infinite;
  transform-origin: center;
}

/* Glow underline */
.glow-line{
  animation:glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse{
  0%,100%{ opacity:0.7; filter:drop-shadow(0 0 4px #cddc39);}
  50%{ opacity:1; filter:drop-shadow(0 0 10px #cddc39);}
}

.motto{
  font-size:13px;
  font-weight:600;
  color:#00aa66;
  margin-top:10px;
}

.linkedin-btn{
  display:inline-block;
  margin-top:28px;
  padding:13px 28px;
  border-radius:30px;
  background:#0A66C2;
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s ease;
  box-shadow:0 8px 22px rgba(10,102,194,0.3);
}

.linkedin-btn:hover{
  background:#004182;
  transform:translateY(-3px);
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">
    <svg viewBox="0 0 900 220" width="100%" xmlns="http://www.w3.org/2000/svg">

      <defs>
        <radialGradient id="globeLight" cx="35%" cy="30%">
          <stop offset="0%" stop-color="#a8d8cc"/>
          <stop offset="60%" stop-color="#6aa89a"/>
          <stop offset="100%" stop-color="#3e7f72"/>
        </radialGradient>
      </defs>

      <!-- FLOAT -->
      <g class="float-layer">

        <!-- ROTATE -->
        <g class="rotate-layer">

          <!-- Globe -->
          <circle cx="95" cy="105" r="65" fill="url(#globeLight)"/>

          <!-- Longitude -->
          <ellipse cx="95" cy="105" rx="50" ry="65"
                   fill="none" stroke="white"
                   stroke-width="1.5" opacity="0.5"/>

          <ellipse cx="95" cy="105" rx="35" ry="65"
                   fill="none" stroke="white"
                   stroke-width="1" opacity="0.4"/>

          <!-- Latitude -->
          <ellipse cx="95" cy="105" rx="65" ry="22"
                   fill="none" stroke="white"
                   stroke-width="1.5" opacity="0.5"/>

          <ellipse cx="95" cy="105" rx="65" ry="12"
                   fill="none" stroke="white"
                   stroke-width="1" opacity="0.35"/>

        </g>
      </g>

      <!-- Shadow -->
      <ellipse class="shadow-layer"
               cx="95"
               cy="180"
               rx="45"
               ry="12"
               fill="black"/>

      <!-- Brand Name -->
      <text x="170" y="120"
            font-size="70"
            font-family="Arial Black, Arial"
            font-weight="900"
            fill="#000">
        𝐏𝐇𝐈𝐋𝐘𝐁𝐎𝐓𝐈𝐂𝐒™
      </text>

      <!-- Underline -->
      <rect x="170" y="140"
            width="470"
            height="8"
            fill="#cddc39"
            class="glow-line"/>

    </svg>
  </div>

  <div class="motto">
🤝🏻Delivering Expertised Technical Services in Engineering Technology & I.T;<div>🤝🏻Delivering Expertised Financial Solutions In Financial Technology & Entrepreneurship;<div>🤝🏻Delivering Expertised Educational Equiprobabilities In Research And Resources.
<a class="linkedin-btn"
     href="https://www.linkedin.com/in/philybotics-eservices-68a669321"
     target="_blank">𝐂𝐎𝐍𝐍𝐄𝐂𝐓</a>
</body>
</html>
